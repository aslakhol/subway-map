<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oslo Subway Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      :root {
        --bg: #f6f2e8;
        --paper: rgba(255, 251, 245, 0.78);
        --ink: #112019;
        --muted: #56635b;
        --accent: #e4572e;
        --accent-dark: #ad3412;
        --accent-soft: rgba(228, 87, 46, 0.14);
        --line: rgba(17, 32, 25, 0.1);
        --shadow: 0 28px 60px rgba(17, 32, 25, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        font-family: "IBM Plex Sans", sans-serif;
        color: var(--ink);
        overflow: hidden;
        background:
          radial-gradient(circle at top left, rgba(19, 128, 107, 0.18), transparent 28%),
          radial-gradient(circle at top right, rgba(228, 87, 46, 0.22), transparent 26%),
          linear-gradient(180deg, #fbf8f0 0%, var(--bg) 100%);
      }

      .page {
        width: 100vw;
        height: 100vh;
      }

      .map-shell {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .overlay-stack {
        display: grid;
        gap: 0.7rem;
        width: min(360px, calc(100vw - 6rem));
        pointer-events: auto;
      }

      .floating-panel,
      .launcher-panel {
        border: 1px solid var(--line);
        border-radius: 1rem;
        background: rgba(255, 252, 247, 0.86);
        backdrop-filter: blur(14px);
        box-shadow: var(--shadow);
      }

      .controls {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 0.7rem;
        padding: 0.85rem;
        align-items: center;
      }

      .filter-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
        padding: 0 0.85rem 0.85rem;
      }

      .search {
        width: 100%;
        padding: 0.82rem 0.95rem;
        border-radius: 0.9rem;
        border: 1px solid rgba(17, 32, 25, 0.14);
        background: rgba(255, 255, 255, 0.92);
        font: inherit;
        color: var(--ink);
      }

      .search:focus,
      button:focus {
        outline: 2px solid rgba(228, 87, 46, 0.36);
        outline-offset: 2px;
      }

      button {
        border: 0;
        border-radius: 0.9rem;
        padding: 0.82rem 1rem;
        background: var(--ink);
        color: #fff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        background: #0b140f;
      }

      .button-row,
      .launcher-panel {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
      }

      .launcher-panel {
        display: inline-flex;
        padding: 0.4rem;
        border-radius: 999px;
        pointer-events: auto;
      }

      .icon-button,
      .launcher-button {
        min-width: 0;
        width: 2.9rem;
        height: 2.9rem;
        padding: 0;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .icon {
        width: 1.2rem;
        height: 1.2rem;
        display: block;
      }

      .station-panel {
        padding: 0.75rem;
      }

      .station-list {
        list-style: none;
        margin: 0;
        padding: 0;
        max-height: min(48vh, 420px);
        overflow: auto;
      }

      .station-list li + li {
        margin-top: 0.45rem;
      }

      .station-card {
        width: 100%;
        display: grid;
        gap: 0.4rem;
        text-align: left;
        padding: 0.78rem 0.88rem;
        border-radius: 0.9rem;
        border: 1px solid transparent;
        background: transparent;
        color: var(--ink);
      }

      .station-card:hover {
        background: rgba(255, 255, 255, 0.68);
        border-color: rgba(17, 32, 25, 0.08);
      }

      .station-card.active {
        background: linear-gradient(135deg, var(--accent-soft), rgba(255, 255, 255, 0.82));
        border-color: rgba(228, 87, 46, 0.22);
      }

      .station-card strong {
        font-size: 1rem;
      }

      .station-copy {
        color: var(--muted);
        font-size: 0.84rem;
      }

      .line-filter {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        padding: 0.48rem 0.7rem;
        border-radius: 999px;
        border: 1px solid rgba(17, 32, 25, 0.12);
        background: rgba(255, 255, 255, 0.8);
        color: var(--ink);
        font: inherit;
        font-size: 0.85rem;
        font-weight: 600;
      }

      .line-filter:hover {
        background: rgba(255, 255, 255, 0.96);
      }

      .line-filter.active {
        border-color: rgba(17, 32, 25, 0.18);
        box-shadow: inset 0 0 0 1px rgba(17, 32, 25, 0.08);
      }

      .line-filter-label {
        color: var(--muted);
        font-size: 0.78rem;
      }

      .line-badges {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        align-items: center;
      }

      .line-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 1.65rem;
        height: 1.65rem;
        padding: 0 0.5rem;
        border-radius: 999px;
        background: var(--line-color, var(--ink));
        color: var(--line-text, #fff);
        font-family: "Space Grotesk", sans-serif;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.01em;
        line-height: 1;
        box-shadow: inset 0 0 0 1px rgba(17, 32, 25, 0.08);
      }

      .map-ui {
        position: absolute;
        z-index: 500;
        top: 1rem;
        left: 1rem;
        display: grid;
        gap: 0.7rem;
        width: fit-content;
        pointer-events: auto;
      }

      #map {
        width: 100%;
        height: 100%;
      }

      .leaflet-popup-content-wrapper {
        border-radius: 1rem;
      }

      .popup-title {
        margin: 0 0 0.15rem;
        font-family: "Space Grotesk", sans-serif;
        font-size: 1rem;
      }

      .popup-copy {
        margin: 0;
        color: var(--muted);
        font-size: 0.88rem;
      }

      .popup-stack {
        display: grid;
        gap: 0.55rem;
      }

      .station-label {
        background: transparent;
        border: 0;
        box-shadow: none;
        padding: 0;
        color: rgba(17, 32, 25, 0.78);
        font-family: "Space Grotesk", sans-serif;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.01em;
        line-height: 1;
        pointer-events: none;
        text-shadow:
          -1px -1px 0 rgba(255, 252, 247, 0.98),
          1px -1px 0 rgba(255, 252, 247, 0.98),
          -1px 1px 0 rgba(255, 252, 247, 0.98),
          1px 1px 0 rgba(255, 252, 247, 0.98),
          0 6px 14px rgba(17, 32, 25, 0.12);
        white-space: nowrap;
      }

      .station-label::before {
        display: none;
      }

      .station-label.is-active {
        color: var(--accent-dark);
      }

      @media (max-width: 980px) {
        .overlay-stack {
          width: min(340px, calc(100vw - 5.25rem));
        }
      }

      @media (max-width: 680px) {
        .controls {
          grid-template-columns: minmax(0, 1fr) auto;
        }

        .map-ui {
          top: 0.75rem;
          left: 0.75rem;
        }

        .overlay-stack {
          width: 100%;
        }

        .station-list {
          max-height: min(38vh, 320px);
        }

        .station-label {
          font-size: 0.66rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="map-shell">
        <div class="map-ui">
          <div id="collapsed-toggle" class="launcher-panel">
            <button
              id="collapsed-toggle-button"
              class="launcher-button"
              type="button"
              aria-label="Show stations"
              title="Show stations"
              aria-controls="overlay-stack"
            >
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M4 7h16M4 12h16M4 17h16"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>
          <div id="overlay-stack" class="overlay-stack" hidden>
            <div class="floating-panel">
              <div class="controls">
                <input
                  id="search"
                  class="search"
                  type="search"
                  placeholder="Search stations"
                  aria-label="Search Oslo subway stations"
                />
                <div class="button-row">
                  <button id="reset-view" type="button">Reset</button>
                  <button
                    id="toggle-panel"
                    class="icon-button"
                    type="button"
                    aria-label="Close stations panel"
                    title="Close stations panel"
                    aria-controls="overlay-stack"
                  >
                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                      <path
                        d="M6 6l12 12M18 6L6 18"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.8"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                    </svg>
                  </button>
                </div>
              </div>
              <div id="line-filters" class="filter-bar" aria-label="Filter by line"></div>
            </div>
            <div class="floating-panel station-panel">
              <ul id="station-list" class="station-list"></ul>
            </div>
          </div>
        </div>
        <div id="map" aria-label="Map of Oslo with subway stations marked"></div>
      </section>
    </main>

          "Grønland",
          "Jernbanetorget",
          "Stortinget",
          "Nationaltheatret",
          "Majorstuen",
          "Blindern",
          "Forskningsparken",
          "Ullevål stadion",
          "Nydalen",
          "Storo",
          "Sinsen",
          "Berg",
          "Tåsen",
          "Østhorn",
          "Holstein",
          "Kringsjå",
          "Sognsvann",
        ],
      };

      const stationLines = new Map();
      Object.entries(lineStations).forEach(([line, names]) => {
        names.forEach((name) => {
          const lines = stationLines.get(name) ?? [];
          lines.push(line);
          stationLines.set(name, lines);
        });
      });

      const stations = stationData.map((station) => {
        const lines = (stationLines.get(station.name) ?? []).sort();
        return {
          ...station,
          lines,
          searchText: `${station.name} ${lines
            .flatMap((line) => [line, `line ${line}`, `linje ${line}`])
            .join(" ")}`.toLocaleLowerCase("en"),
        };
      });

      const searchInput = document.getElementById("search");
      const resetViewButton = document.getElementById("reset-view");
      const stationList = document.getElementById("station-list");
      const lineFilters = document.getElementById("line-filters");
      const togglePanelButton = document.getElementById("toggle-panel");
      const collapsedToggleButton = document.getElementById("collapsed-toggle-button");
      const collapsedToggle = document.getElementById("collapsed-toggle");
      const overlayStack = document.getElementById("overlay-stack");

      const map = L.map("map", {
        zoomControl: false,
        minZoom: 10,
      });

      L.control.zoom({ position: "bottomright" }).addTo(map);

      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
        {
          attribution:
            '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
          subdomains: "abcd",
          maxZoom: 20,
        }
      ).addTo(map);

      const allBounds = L.latLngBounds(stations.map((station) => [station.lat, station.lon]));
      map.fitBounds(allBounds.pad(0.08));

      const stationsByName = new Map(stations.map((station) => [station.name, station]));
      const markersByName = new Map();
      const labelsByName = new Map();
      const labelZoomThreshold = 13;
      let activeStation = "";
      let currentQuery = "";
      let activeLineFilter = "";
      let isPanelHidden = true;

      const badgeHtml = (line) =>
        `<span class="line-badge" style="--line-color:${lineMeta[line].color}; --line-text:${lineMeta[line].text};" aria-label="${lineMeta[line].label}">${line}</span>`;

      const lineBadgesHtml = (lines) =>
        `<div class="line-badges">${lines.map((line) => badgeHtml(line)).join("")}</div>`;

      const lineCopy = (station) =>
        station.lines.length === 1
          ? `Served by ${lineMeta[station.lines[0]].label}`
          : `Served by lines ${station.lines.join(", ")}`;

      const markerAccent = (station) => {
        if (activeLineFilter && station.lines.includes(activeLineFilter)) {
          return lineMeta[activeLineFilter].color;
        }

        if (station.lines.length === 1) {
          return lineMeta[station.lines[0]].color;
        }

        return "#5f6c64";
      };

      const markerStyle = (station, matched, selected) => {
        const accent = markerAccent(station);

        return {
          radius: selected ? 8 : 6,
          color: selected ? "#112019" : "#ffffff",
          weight: selected ? 2.3 : 1.6,
          fillColor: accent,
          opacity: matched ? 1 : 0.18,
          fillOpacity: selected ? 0.98 : matched ? 0.84 : 0.1,
        };
      };

      const matchesSearch = (station) =>
        station.searchText.includes(currentQuery);

      const matchesLineFilter = (station) =>
        !activeLineFilter || station.lines.includes(activeLineFilter);

      const matchesFilters = (station) => matchesSearch(station) && matchesLineFilter(station);

      const popupHtml = (station) =>
        `
          <div class="popup-stack">
            <p class="popup-title">${station.name}</p>
            <p class="popup-copy">${lineCopy(station)}</p>
            ${lineBadgesHtml(station.lines)}
          </div>
        `;

      const labelDirection = (station) => {
        const center = allBounds.getCenter();
        const latDelta = station.lat - center.lat;
        const lonDelta = station.lon - center.lng;

        if (Math.abs(lonDelta) > Math.abs(latDelta)) {
          return lonDelta >= 0 ? "right" : "left";
        }

        return latDelta >= 0 ? "top" : "bottom";
      };

      const labelOffset = {
        top: [0, -12],
        right: [12, 0],
        bottom: [0, 12],
        left: [-12, 0],
      };

      stations.forEach((station) => {
        const direction = labelDirection(station);
        const marker = L.circleMarker(
          [station.lat, station.lon],
          markerStyle(station, true, false)
        )
          .addTo(map)
          .bindPopup(popupHtml(station))
          .bindTooltip(station.name, {
            permanent: true,
            direction,
            offset: labelOffset[direction],
            className: "station-label",
          });

        marker.on("click", () => {
          activeStation = station.name;
          marker.openPopup();
          refresh();
          scrollStationIntoView(station.name);
        });

        markersByName.set(station.name, marker);
        labelsByName.set(station.name, marker.getTooltip());
      });

      function focusStation(name, shouldOpenPopup = true) {
        const station = stationsByName.get(name);
        if (!station) {
          return;
        }

        activeStation = name;
        const nextZoom = Math.max(map.getZoom(), 14);
        map.flyTo([station.lat, station.lon], nextZoom, {
          animate: true,
          duration: 0.7,
        });

        if (shouldOpenPopup) {
          markersByName.get(name).openPopup();
        }

        refresh();
        scrollStationIntoView(name);
      }

      function scrollStationIntoView(name) {
        const element = stationList.querySelector(`[data-station="${CSS.escape(name)}"]`);
        if (element) {
          element.scrollIntoView({ block: "nearest" });
        }
      }

      function renderList() {
        const visibleStations = stations.filter(matchesFilters);
        stationList.innerHTML = "";

        if (!visibleStations.length) {
          const emptyItem = document.createElement("li");
          emptyItem.innerHTML =
            '<button class="station-card" type="button" disabled><strong>No matches</strong><span>Try another station name.</span></button>';
          stationList.appendChild(emptyItem);
          return;
        }

        visibleStations.forEach((station) => {
          const item = document.createElement("li");
          const button = document.createElement("button");
          button.type = "button";
          button.className = "station-card";
          button.dataset.station = station.name;

          if (station.name === activeStation) {
            button.classList.add("active");
          }

          button.innerHTML = `
            <strong>${station.name}</strong>
            ${lineBadgesHtml(station.lines)}
            <span class="station-copy">${lineCopy(station)}</span>
          `;

          button.addEventListener("click", () => focusStation(station.name));
          item.appendChild(button);
          stationList.appendChild(item);
        });
      }

      function renderLineFilters() {
        const searchFilteredStations = stations.filter(matchesSearch);
        const buttons = [
          `<button
            type="button"
            class="line-filter${activeLineFilter ? "" : " active"}"
            data-line=""
            aria-pressed="${String(!activeLineFilter)}"
          >
            <span>All lines</span>
            <span class="line-filter-label">${searchFilteredStations.length}</span>
          </button>`,
          ...Object.keys(lineMeta).map((line) => {
            const count = searchFilteredStations.filter((station) =>
              station.lines.includes(line)
            ).length;

            return `<button
              type="button"
              class="line-filter${activeLineFilter === line ? " active" : ""}"
              data-line="${line}"
              aria-pressed="${String(activeLineFilter === line)}"
              title="${lineMeta[line].label}"
            >
              ${badgeHtml(line)}
              <span class="line-filter-label">${count}</span>
            </button>`;
          }),
        ];

        lineFilters.innerHTML = buttons.join("");

        lineFilters.querySelectorAll("[data-line]").forEach((button) => {
          button.addEventListener("click", () => {
            activeLineFilter = button.dataset.line;

            if (activeStation && !matchesFilters(stationsByName.get(activeStation))) {
              activeStation = "";
              map.closePopup();
            }

            refresh();
          });
        });
      }

      function refreshMarkers() {
        stations.forEach((station) => {
          const matched = matchesFilters(station);
          const selected = station.name === activeStation;
          markersByName.get(station.name).setStyle(markerStyle(station, matched, selected));
        });
      }

      function refreshLabels() {
        const zoom = map.getZoom();

        stations.forEach((station) => {
          const marker = markersByName.get(station.name);
          const tooltip = labelsByName.get(station.name);
          const matched = matchesFilters(station);
          const selected = station.name === activeStation;
          const shouldShow =
            selected || (matched && (currentQuery.length > 0 || zoom >= labelZoomThreshold));

          if (shouldShow) {
            marker.openTooltip();

            const label = tooltip.getElement();
            if (label) {
              label.classList.toggle("is-active", selected);
            }
          } else {
            marker.closeTooltip();
          }
        });
      }

      function refresh() {
        renderLineFilters();
        renderList();
        refreshMarkers();
        refreshLabels();
      }

      function syncPanelVisibility() {
        overlayStack.hidden = isPanelHidden;
        collapsedToggle.hidden = !isPanelHidden;
        togglePanelButton.setAttribute("aria-expanded", String(!isPanelHidden));
        collapsedToggleButton.setAttribute("aria-expanded", String(!isPanelHidden));
      }

      searchInput.addEventListener("input", (event) => {
        currentQuery = event.target.value.trim().toLocaleLowerCase("en");

        if (activeStation && !matchesFilters(stationsByName.get(activeStation))) {
          activeStation = "";
          map.closePopup();
        }

        refresh();
      });

      togglePanelButton.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        isPanelHidden = true;
        syncPanelVisibility();
      });

      collapsedToggleButton.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        isPanelHidden = false;
        syncPanelVisibility();
      });

      resetViewButton.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        activeStation = "";
        currentQuery = "";
        activeLineFilter = "";
        searchInput.value = "";
        map.fitBounds(allBounds.pad(0.08));
        map.closePopup();
        refresh();
      });

      map.on("zoomend", refreshLabels);

      syncPanelVisibility();
      refresh();
    </script>
  </body>
</html>
